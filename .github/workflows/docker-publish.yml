name: Docker Image CI/CD (Extension Repos)

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'server/**'
      - 'ml/serving/**'
      - 'sensecheck-aura/client/**'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [ "deploy" ]
  workflow_dispatch:

jobs:
  build-and-push-server:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Extension Server Image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        file: ./server/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/extension-server:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-server:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-server:buildcache,mode=max

  build-and-push-ml:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Extension ML API Image
      uses: docker/build-push-action@v5
      with:
        context: ./ml
        file: ./ml/serving/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/extension-ml-api:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-ml-api:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-ml-api:buildcache,mode=max

  build-and-push-onboarding:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Onboarding Game artifacts
      working-directory: ./sensecheck-aura/client
      env:
        VITE_API_URL: ${{ vars.EXTENSION_ONBOARDING_API_URL || 'http://4.194.234.251:4020/api' }}
      run: |
        npm install
        npm run build -- --emptyOutDir

    - name: Build and push Onboarding Game Image
      uses: docker/build-push-action@v5
      with:
        context: ./sensecheck-aura/client
        file: ./sensecheck-aura/client/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/extension-onboarding-game:latest
        build-args: |
          VITE_API_URL=${{ vars.EXTENSION_ONBOARDING_API_URL || 'http://4.194.234.251:4020/api' }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-onboarding-game:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-onboarding-game:buildcache,mode=max

  deploy-to-vps:
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-and-push-server
      - build-and-push-ml
      - build-and-push-onboarding
    runs-on: ubuntu-latest
    steps:
    - name: Deploy Extension services to VPS
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        # passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
        port: ${{ secrets.VPS_PORT || '22' }}
        script_stop: true
        script: |
          set -eu

          LOCK_DIR=/tmp/aura-deploy.lock
          while ! mkdir "$LOCK_DIR" 2>/dev/null; do
            sleep 2
          done
          trap 'rmdir "$LOCK_DIR"' EXIT

          check_url() {
            url="$1"
            attempt=1
            while [ "$attempt" -le 12 ]; do
              if command -v curl > /dev/null 2>&1; then
                if curl -fsS "$url" > /dev/null; then
                  return 0
                fi
              elif wget -q -O /dev/null "$url"; then
                return 0
              fi
              attempt=$((attempt + 1))
              sleep 5
            done
            return 1
          }

          resolve_compose() {
            if docker info > /dev/null 2>&1; then
              if command -v docker-compose > /dev/null 2>&1; then
                COMPOSE_BIN="docker-compose"
                return 0
              fi
              if docker compose version > /dev/null 2>&1; then
                COMPOSE_BIN="docker compose"
                return 0
              fi
            fi

            if sudo -n docker info > /dev/null 2>&1; then
              if command -v docker-compose > /dev/null 2>&1 && sudo -n docker-compose version > /dev/null 2>&1; then
                COMPOSE_BIN="sudo -n docker-compose"
                return 0
              fi
              if sudo -n docker compose version > /dev/null 2>&1; then
                COMPOSE_BIN="sudo -n docker compose"
                return 0
              fi
            fi

            echo "Docker daemon is not accessible for this SSH user. Add the user to the docker group or allow passwordless sudo for docker/docker-compose."
            exit 1
          }

          cd "${{ secrets.VPS_DEPLOY_PATH }}"
          export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
          resolve_compose

          sh -c "$COMPOSE_BIN pull ext-server ext-ml ext-onboarding"
          sh -c "$COMPOSE_BIN up -d --force-recreate --no-deps ext-server ext-ml ext-onboarding"

          check_url "http://127.0.0.1:4020/" &&
          check_url "http://127.0.0.1:4030/health" &&
          check_url "http://127.0.0.1:8080/" || {
            sh -c "$COMPOSE_BIN ps ext-server ext-ml ext-onboarding"
            sh -c "$COMPOSE_BIN logs --tail 50 ext-server ext-ml ext-onboarding"
            exit 1
          }
