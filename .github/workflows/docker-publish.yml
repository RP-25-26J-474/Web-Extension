name: Docker Image CI/CD (Extension Repos)

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'server/**'
      - 'ml/serving/**'
      - 'sensecheck-aura/client/**'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [ "deploy" ]

jobs:
  build-and-push-server:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Extension Server Image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        file: ./server/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/extension-server:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-server:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-server:buildcache,mode=max

  build-and-push-ml:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Extension ML API Image
      uses: docker/build-push-action@v5
      with:
        context: ./ml/serving
        file: ./ml/serving/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/extension-ml-api:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-ml-api:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-ml-api:buildcache,mode=max

  build-and-push-onboarding:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Onboarding Game artifacts
      working-directory: ./sensecheck-aura/client
      run: |
        npm install
        npm run build -- --emptyOutDir

    - name: Build and push Onboarding Game Image
      uses: docker/build-push-action@v5
      with:
        context: ./sensecheck-aura/client
        file: ./sensecheck-aura/client/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/extension-onboarding-game:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-onboarding-game:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/extension-onboarding-game:buildcache,mode=max
